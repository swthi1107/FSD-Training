<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="weather-card shadow-lg">
        <h2 class="text-center mb-4">Weather App</h2>
        <div class="input-group mb-3">
            <input type="text" id="city" class="form-control" placeholder="Enter City Name">
            <button class="btn btn-primary" onclick="getWeather()">Search</button>
        </div>
        <div id="weatherResult" class="text-center">
            <h3 id="cityName"></h3>
            <h1 id="temp"></h1>
            <p id="condition"></p>
            <div class="row mt-4">
                <div class="col">
                    <h5>Humidity</h5>
                    <p id="humidity"></p>
                </div>
                <div class="col">
                    <h5>Wind Speed</h5>
                    <p id="wind"></p>
                </div>
            </div>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
