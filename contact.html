<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-secondary navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">CVR College of Engineering</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link active" href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <div class="container section-gap">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        
        <div class="card shadow-lg">
          <div class="card-body p-4">
            <h2 class="mb-3">Contact Us</h2>
            <form>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Name</label>
                  <input type="text" class="form-control" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Subject</label>
                  <input type="text" class="form-control" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Message</label>
                  <textarea class="form-control" rows="4" required></textarea>
                </div>
                <div class="col-12">
                  <button type="submit" class="btn btn-primary">Send Message</button>
                </div>
              </div>
            </form>
          </div>
        </div>
        <br>
        <div class="alert alert-danger test-center">Be sure to submit correct details. Our team will contact you soon.</div>
      </div>
    </div>
  </div>


</body>
</html>
