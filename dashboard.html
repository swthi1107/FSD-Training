<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-secondary navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">CVR College of Engineering</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="register.html">Register</a>
        <a class="nav-link active" href="dashboard.html">Dashboard</a>
        <a class="nav-link" href="profile.html">Profile</a>
      </div>
    </div>
  </nav>

  <div class="container section-gap">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
      <div>
        <h2 class="mb-1">Student Dashboard</h2>
      </div>
      <div class="input-group" style="max-width: 280px;">
        <span class="input-group-text bg-warning">Search</span>
        <input type="text" class="form-control" placeholder="Roll no or name" />
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-sm-6 col-lg-3"><div class="card text-center stat-card"><div class="card-body"><h5>Total Students</h5><span class="badge bg-primary fs-6">1200</span></div></div></div>
      <div class="col-sm-6 col-lg-3"><div class="card text-center stat-card"><div class="card-body"><h5>Present Students</h5><span class="badge bg-success fs-6">1124</span></div></div></div>
      <div class="col-sm-6 col-lg-3"><div class="card text-center stat-card"><div class="card-body"><h5>Absent Students</h5><span class="badge bg-danger fs-6">76</span></div></div></div>
      <div class="col-sm-6 col-lg-3"><div class="card text-center stat-card"><div class="card-body"><h5>Placements</h5><span class="badge bg-info text-dark fs-6">1000</span></div></div></div>
    </div>

    <div class="card">
      <div class="card-header bg-white text-center p-3">
        <strong>Student Table</strong>
      </div>
      <div class="table-responsive shadow p-2">
        <table class="table mb-0 align-middle">
          <thead>
            <tr>
              <th>Roll No</th>
              <th>Name</th>
              <th>Branch</th>
              <th>Attendance</th>
            </tr>
          </thead>
          <tbody>
            <tr><td>6201</td><td>Alice</td><td>CSC</td><td><span class="badge bg-success">Present</span></td></tr>
            <tr><td>0502</td><td>Bob</td><td>CSE</td><td><span class="badge bg-success">Present</span></td></tr>
            <tr><td>6603</td><td>Carrie</td><td>CSM</td><td><span class="badge bg-danger">Absent</span></td></tr>
            <tr><td>6704</td><td>Daniel</td><td>AIML</td><td><span class="badge bg-success">Present</span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
